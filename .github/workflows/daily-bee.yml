name: Daily Spelling Bee Answer Page

on:
 schedule:
   - cron: '5 14 * * *'
 workflow_dispatch:
   inputs:
     target_date:
       description: 'Date to generate (YYYY-MM-DD). Leave blank for today.'
       required: false
       type: string

jobs:
 generate-and-deploy:
   runs-on: ubuntu-latest
   timeout-minutes: 10
   permissions:
     contents: write

   steps:
     - name: Checkout repository
       uses: actions/checkout@v4
       with:
         token: ${{ secrets.GITHUB_TOKEN }}

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '24'

     - name: Install dependencies
       run: npm install ftp-deploy

     - name: Generate answer page
       run: node scripts/generate-answer-page.js "${{ inputs.target_date }}"
       env:
         TZ: America/New_York

     - name: Commit generated files to repo
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "github-actions[bot]@users.noreply.github.com"
         git add answers/
         git diff --staged --quiet || git commit -m "Auto: add spelling bee answers ${{ inputs.target_date }}$(date +'%Y-%m-%d')"
         git push
       env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

     - name: Setup SSH key
       run: |
         mkdir -p ~/.ssh
         echo "${{ secrets.SSH_KEY }}" > ~/.ssh/spellingbee_deploy
         chmod 600 ~/.ssh/spellingbee_deploy
         ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

     - name: Compute slug for deploy
       id: slug
       run: |
         if [ -n "${{ inputs.target_date }}" ]; then
           TARGET="${{ inputs.target_date }}"
           MONTH=$(date -d "$TARGET" +'%B' | tr '[:upper:]' '[:lower:]')
           DAY=$(date -d "$TARGET" +'%d')
           YEAR=$(date -d "$TARGET" +'%Y')
         else
           MONTH=$(TZ="America/New_York" date +'%B' | tr '[:upper:]' '[:lower:]')
           DAY=$(TZ="America/New_York" date +'%d')
           YEAR=$(TZ="America/New_York" date +'%Y')
         fi
         SLUG="spelling-bee-${MONTH}-${DAY}-${YEAR}"
         echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
         echo "Computed slug: $SLUG"

     - name: Deploy generated files via rsync
       run: |
         SLUG="${{ steps.slug.outputs.slug }}"
         echo "Deploying: $SLUG"
         rsync -avz \
           -e "ssh -i ~/.ssh/spellingbee_deploy -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
           answers/${SLUG}.html \
           answers/${SLUG}.json \
           ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/domains/spellingbeefinder.com/public_html/answers/

     - name: Cleanup SSH key
       if: always()
       run: rm -f ~/.ssh/spellingbee_deploy
