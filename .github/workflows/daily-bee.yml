name: Daily Spelling Bee Answer Page

on:
 schedule:
   - cron: '5 14 * * *'
 workflow_dispatch:

jobs:
 generate-and-deploy:
   runs-on: ubuntu-latest
   timeout-minutes: 10
   permissions:
     contents: write

   steps:
     - name: Checkout repository
       uses: actions/checkout@v4
       with:
         token: ${{ secrets.GITHUB_TOKEN }}

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '24'

     - name: Install dependencies
       run: npm install ftp-deploy

     - name: Generate today's answer page
       run: node scripts/generate-answer-page.js
       env:
         TZ: America/New_York

     - name: Commit generated files to repo
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "github-actions[bot]@users.noreply.github.com"
         git add answers/
         git diff --staged --quiet || git commit -m "Auto: add spelling bee answers $(date +'%Y-%m-%d')"
         git push
       env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

     - name: Setup SSH key
       run: |
         mkdir -p ~/.ssh
         echo "${{ secrets.SSH_KEY }}" > ~/.ssh/spellingbee_deploy
         chmod 600 ~/.ssh/spellingbee_deploy
         ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

     - name: Deploy today's files via rsync
       run: |
         TODAY=$(TZ="America/New_York" date +'%B' | tr '[:upper:]' '[:lower:]')
         DAY=$(TZ="America/New_York" date +'%d')
         YEAR=$(TZ="America/New_York" date +'%Y')
         SLUG="spelling-bee-${TODAY}-${DAY}-${YEAR}"
         echo "Deploying: $SLUG"
         rsync -avz \
           -e "ssh -i ~/.ssh/spellingbee_deploy -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
           answers/${SLUG}.html \
           answers/${SLUG}.json \
           ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/domains/spellingbeefinder.com/public_html/answers/

     - name: Cleanup SSH key
       if: always()
       run: rm -f ~/.ssh/spellingbee_deploy
